{% extends "admin/change_form.html" %}
{% load i18n %}

{% block after_related_objects %}{{ block.super }}

{% if receipt_url %}
<div class="module asection" style="margin-top:16px;">
  <h2>{% translate "Receipt" %}</h2>
  <div style="padding:12px 14px;">
    <a href="{{ receipt_url }}" target="_blank" rel="noopener">
      <img src="{{ receipt_url }}"
           style="max-width:100%;max-height:480px;border-radius:6px;border:1px solid var(--hairline-color);display:block;">
    </a>
  </div>
</div>
{% endif %}

{% if asset_object_id %}
<div class="module asection" id="ro-asset-manager" style="margin-top:16px;"
     data-list-url="{% url 'admin:asset_list' %}"
     data-ct="{{ asset_content_type_id }}"
     data-obj="{{ asset_object_id }}">
  <h2>{% translate "Attachments" %}</h2>
  <div style="padding:12px 14px;">
    <div id="ro-am-grid" class="am-grid"></div>
    <p id="ro-am-empty" class="am-empty" style="display:none;">{% translate "No attachments." %}</p>
  </div>
</div>

<style>
  .am-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
  .am-card {
    border:1px solid var(--hairline-color,#e0e0e0);
    border-radius:6px; overflow:hidden;
    background:var(--body-bg); display:flex; flex-direction:column;
  }
  .am-card-link { display:block; text-decoration:none; color:inherit; }
  .am-thumb {
    height:110px; display:flex; align-items:center; justify-content:center;
    background:var(--darkened-bg); overflow:hidden;
  }
  .am-thumb img { width:100%; height:100%; object-fit:cover; }
  .am-badge {
    font-weight:700; font-size:15px; letter-spacing:.04em; color:#fff;
    padding:14px 12px; border-radius:6px; background:#6b7280;
  }
  .am-badge.url  { background:#2563eb; }
  .am-badge.PDF  { background:#dc2626; }
  .am-badge.DOC, .am-badge.DOCX { background:#2563eb; }
  .am-badge.XLS, .am-badge.XLSX { background:#16a34a; }
  .am-meta { padding:7px 9px; font-size:12px; }
  .am-name { display:block; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .am-sub  { color:var(--body-quiet-color); font-size:11px; }
</style>

<script>
(function () {
  const root     = document.getElementById('ro-asset-manager');
  const grid     = document.getElementById('ro-am-grid');
  const emptyMsg = document.getElementById('ro-am-empty');
  const LIST_URL = root.dataset.listUrl;
  const CT       = root.dataset.ct;
  const OBJ      = root.dataset.obj;

  function cardHtml(a) {
    const thumb = a.thumb_url
      ? `<div class="am-thumb"><img src="${a.thumb_url}" alt=""></div>`
      : `<div class="am-thumb"><span class="am-badge ${a.is_url ? 'url' : a.label}">${a.label}</span></div>`;
    const sub = a.is_url ? '{% translate "External link" %}' : (a.size_text || a.mime);
    return `
      <div class="am-card">
        <a class="am-card-link" href="${a.click_url}" target="_blank" rel="noopener">
          ${thumb}
          <div class="am-meta">
            <span class="am-name" title="${a.name}">${a.name}</span>
            <span class="am-sub">${sub}</span>
          </div>
        </a>
      </div>`;
  }

  fetch(`${LIST_URL}?content_type_id=${CT}&object_id=${OBJ}`)
    .then(r => r.json())
    .then(d => {
      const assets = d.assets || [];
      if (assets.length) {
        assets.forEach(a => grid.insertAdjacentHTML('beforeend', cardHtml(a)));
      } else {
        emptyMsg.style.display = 'block';
      }
    });
})();
</script>
{% endif %}

{% endblock %}
