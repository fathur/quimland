{% extends "admin/change_list.html" %}
{% load i18n %}

{% block result_list %}
  {{ block.super }}
  {% if nominal_total %}
  <div style="margin-top:16px;padding:14px 18px;background:var(--darkened-bg);border:1px solid var(--hairline-color);border-radius:8px;display:flex;align-items:center;gap:24px;">
    <span style="font-size:13px;color:var(--body-quiet-color);">
      {% blocktranslate with count=nominal_total_count %}Total ({{ count }} transactions){% endblocktranslate %}
    </span>
    <span style="font-size:18px;font-weight:700;letter-spacing:.01em;">{{ nominal_total }}</span>
  </div>
  {% endif %}
{% endblock %}
